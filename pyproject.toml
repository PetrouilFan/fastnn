[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "fastnn"
version = "1.1.0"
requires-python = ">=3.12"
dependencies = [
  "numpy>=1.24",
  "pip>=26.0.1",
  "torch>=2.11.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-benchmark"]

[tool.maturin]
features = ["pyo3/extension-module"]
python-source = "."
module-name = "fastnn._core"
