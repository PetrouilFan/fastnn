[package]
name = "fastnn"
version = "0.3.0"
edition = "2021"

[lib]
name = "fastnn"
crate-type = ["cdylib"]

[dependencies]
pyo3          = { version = "0.28", features = ["extension-module", "abi3-py312"] }
rayon         = "1.8"
smallvec      = { version = "1.11", features = ["union", "const_generics"] }
safetensors   = "0.4"
half          = "2.3"
bytemuck      = { version = "1.14", features = ["derive"] }
thiserror     = "1.0"
parking_lot   = "0.12"
ctor          = "0.2"
serde         = { version = "1.0", features = ["derive"] }
serde_json    = "1.0"
rand          = "0.8"
matrixmultiply = "0.3"
mimalloc      = "0.1"
wide         = "0.7"
wgpu         = "24"
pollster     = "0.4"
openblas-src = { version = "0.10", optional = true }

[target.'cfg(not(target_os = "windows"))'.dependencies]
libc = "0.2"

[features]
default = ["simd", "parallel", "simd_avx512"]
openblas = []
parallel = []
simd = []
prefetch = []
simd_avx512 = []

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
debug = false
strip = true
panic = "abort"
