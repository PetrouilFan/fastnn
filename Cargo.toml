[package]
name = "fastnn"
version = "0.1.0"
edition = "2021"

[lib]
name = "fastnn"
crate-type = ["cdylib"]

[dependencies]
pyo3          = { version = "0.28", features = ["extension-module", "abi3-py312"] }
rayon         = "1.8"
smallvec      = { version = "1.11", features = ["union", "const_generics"] }
safetensors   = "0.4"
half          = "2.3"
bytemuck      = { version = "1.14", features = ["derive"] }
thiserror     = "1.0"
parking_lot   = "0.12"
ctor          = "0.2"
serde         = { version = "1.0", features = ["derive"] }
serde_json    = "1.0"
rand          = "0.8"
matrixmultiply = "0.3"

[target.'cfg(windows)'.dependencies]
blas-sys = { version = "0.9", optional = true }

[features]
default = ["simd"]
blas = ["dep:blas-sys"]
parallel = []
simd = []

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
debug = false
strip = true
panic = "abort"
