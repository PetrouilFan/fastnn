[package]
name = "fastnn"
version = "2.1.0"
edition = "2021"

[lib]
name = "fastnn"
crate-type = ["cdylib", "lib"]

[dependencies]
pyo3          = { version = "0.28", features = ["extension-module", "abi3-py312"] }
rayon         = "1.8"
smallvec      = { version = "1.11", features = ["union", "const_generics"] }
safetensors   = "0.4"
half          = "2.3"
bytemuck      = { version = "1.14", features = ["derive"] }
thiserror     = "1.0"
parking_lot   = "0.12"
dashmap       = "6"
ctor          = "0.2"
serde         = { version = "1.0", features = ["derive"] }
serde_json    = "1.0"
rand          = "0.8"
matrixmultiply = "0.3"
mimalloc      = "0.1"
wide         = "0.7"
wgpu         = "24"
pollster     = "0.4"
openblas-src = { version = "0.10", optional = true }
blas-src     = { version = "0.10", features = ["openblas"], optional = true }
fnv          = "1.0"
rustc-hash  = "2.0"
ndarray      = { version = "0.16", features = ["blas"] }

[features]
default = ["simd", "parallel", "simd_avx512"]
openblas = ["blas-src/openblas-src"]
blas = []
parallel = []
simd = []
prefetch = []
simd_avx512 = []
neon = []

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
debug = false
strip = true
panic = "abort"

[profile.bench]
lto = true
codegen-units = 1
opt-level = 3
debug = false
strip = true

[[bench]]
name = "quantized_vs_pytorch"
path = "benches/quantized_vs_pytorch.rs"
harness = false

[[bench]]
name = "packed_bench"
path = "benches/packed_bench.rs"
harness = false

[[bench]]
name = "wgpu_bench"
path = "benches/wgpu_bench.rs"
harness = false


[[bench]]
name = "perf_optimizations"
path = "benches/perf_optimizations.rs"
harness = false

[[bench]]
name = "packed_dispatch_bench"
path = "benches/packed_dispatch_bench.rs"
harness = false


