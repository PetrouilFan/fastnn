name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linter
        run: pip install ruff

      - name: Run Python linter
        run: ruff check .

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust linter
        run: rustup component add clippy

      - name: Run Rust linter
        run: cargo clippy -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Create virtualenv
        run: uv venv .venv

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libatlas-base-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build extension
        uses: PyO3/maturin-action@v1
        with:
          command: develop

      - name: Install dev dependencies
        run: uv pip install pytest pytest-benchmark

      - name: Run Python tests
        shell: bash
        run: |
          set +e
          uv run python -m pytest tests/ -v --ignore=tests/test_transformer.py 2>&1 | tee /tmp/pytest_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          # PyO3 extensions sometimes crash during Python process cleanup on
          # Windows (heap corruption 0xc0000374) and occasionally on Linux
          # (SIGSEGV/SIGABRT). If pytest output shows all tests passed but
          # process exits non-zero, it's a cleanup crash.
          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q " passed" /tmp/pytest_output.txt && ! grep -q " failed" /tmp/pytest_output.txt; then
              echo "::warning::All tests passed but process crashed at cleanup (exit $EXIT_CODE)"
              exit 0
            fi
            echo "::error::Tests failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
