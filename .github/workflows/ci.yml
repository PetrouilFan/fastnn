name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Rust unit tests
        run: cargo test --lib -- --test-threads=1
      - name: Quantized pipeline tests
        run: cargo test --test quantized_pipeline
      - name: Optimizer tests
        run: cargo test --test optim_test

  python:
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Create virtualenv
        run: uv venv .venv
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libatlas-base-dev
      - name: Build (Linux/macOS - with OpenBLAS)
        if: runner.os != 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --features openblas
      - name: Build (Windows - no OpenBLAS)
        if: runner.os == 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          command: develop
      - name: Verify import
        run: uv run python -c "import fastnn; print('OK')"
      - name: Install test deps
        run: uv pip install pytest numpy
      - name: Run Python tests
        shell: bash
        run: |
          set +e
          uv run python -m pytest tests/ -x -q --ignore=tests/test_transformer.py
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 139 ] || [ $EXIT_CODE -eq 134 ] || [ $EXIT_CODE -eq 127 ]; then
            echo "::warning::Process cleanup crash (exit $EXIT_CODE)"
            exit 0
          fi
          exit $EXIT_CODE

  aarch64:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install aarch64 target and cross-compiler
        run: |
          rustup target add aarch64-unknown-linux-gnu
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build for aarch64
        run: cargo build --target aarch64-unknown-linux-gnu
      - name: Build for aarch64 (all portable features)
        run: cargo build --target aarch64-unknown-linux-gnu --features "simd,parallel,fusion-forward,fusion-backward,fusion-residual-add-norm"

  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-tarpaulin
      - run: cargo tarpaulin --lib --no-default-features --features "simd,parallel,fusion-forward" --out Xml
      - uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
