name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linter
        run: pip install ruff

      - name: Run Python linter
        run: ruff check .

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust linter
        run: rustup component add clippy

      - name: Run Rust linter
        run: cargo clippy -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Create virtualenv
        run: uv venv .venv

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libatlas-base-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build extension
        uses: PyO3/maturin-action@v1
        with:
          command: develop

      - name: Install dev dependencies
        run: uv pip install pytest pytest-benchmark

      - name: Run Python tests
        shell: bash
        run: |
          set +e
          uv run python -m pytest tests/ -v --ignore=tests/test_transformer.py
          EXIT_CODE=$?
          set -e
          # PyO3 extensions sometimes crash during Python process cleanup on
          # Linux (SIGSEGV=139, SIGABRT=134). All tests pass but the process
          # crashes at exit. Forgive signal-based exit codes only.
          # NOTE: exit code 1 on Windows is NOT forgiven — it is pytest's
          # standard test-failure exit code and would mask real regressions.
          if [ $EXIT_CODE -eq 139 ] || [ $EXIT_CODE -eq 134 ]; then
            echo "::warning::Process cleanup crash (signal $((EXIT_CODE - 128)))"
            exit 0
          fi
          exit $EXIT_CODE
