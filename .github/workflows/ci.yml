name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python linter
        run: pip install ruff

      - name: Run Python linter
        run: ruff check .

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust linter
        run: rustup component add clippy

      - name: Run Rust linter
        run: cargo clippy -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Create virtualenv
        run: uv venv .venv

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libatlas-base-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build extension
        uses: PyO3/maturin-action@v1
        with:
          command: develop

      - name: Install dev dependencies
        run: uv pip install pytest pytest-benchmark

      - name: Run Python tests
        shell: bash
        run: |
          set +e
          uv run python -m pytest tests/ -v --ignore=tests/test_transformer.py
          EXIT_CODE=$?
          set -e
          # PyO3 extensions sometimes crash during Python process cleanup on
          # Linux (SIGSEGV=139, SIGABRT=134) and Windows (exit 127).
          # All tests pass but the process crashes at exit.
          # Forgive signal-based exit codes and cleanup crash codes only.
          # NOTE: exit code 1 is NOT forgiven — it is pytest's standard
          # test-failure exit code and would mask real regressions.
          if [ $EXIT_CODE -eq 139 ] || [ $EXIT_CODE -eq 134 ] || [ $EXIT_CODE -eq 127 ]; then
            echo "::warning::Process cleanup crash (exit $EXIT_CODE)"
            exit 0
          fi
          exit $EXIT_CODE

  benchmark:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Create virtualenv
        run: uv venv .venv

      - name: Install system dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libatlas-base-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build extension
        uses: PyO3/maturin-action@v1
        with:
          command: develop

      - name: Install PyTorch
        run: uv pip install torch --quiet

      - name: Run PyTorch comparison benchmarks
        shell: bash
        run: |
          uv run python benchmarks/pytorch_comparison.py \
            --fast --output results.json

      - name: Build packed precision benchmark binary
        shell: bash
        run: cargo build --release --bin packed_bench_json

      - name: Run packed precision benchmarks
        shell: bash
        run: |
          ./target/release/packed_bench_json > packed_results.json

      - name: Merge and write benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "**Commit:** ${{ github.sha }}"
            echo "**Run:** ${{ github.run_id }}"
            echo ""
            uv run python .github/merge_benchmarks.py results.json packed_results.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results.json
            packed_results.json
